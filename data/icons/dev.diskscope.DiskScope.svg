<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- DiskScope app icon: a category "storage wheel" echoing the in-app
       segmented usage ring (Videos/Audio/Images/… colours). -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9e8e6"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square backplate so the icon reads on any wallpaper. -->
  <rect x="8" y="8" width="112" height="112" rx="26" fill="url(#bg)"/>
  <rect x="8.5" y="8.5" width="111" height="111" rx="25.5" fill="none"
        stroke="#000000" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Faint full track behind the segments. -->
  <circle cx="64" cy="64" r="42" fill="none" stroke="#000000"
          stroke-opacity="0.06" stroke-width="18"/>

  <!-- Category segments, clockwise from the top. -->
  <g fill="none" stroke-width="18" stroke-linecap="butt">
    <path d="M 64 22 A 42 42 0 0 1 105.3 71.9" stroke="#e01b24"/>
    <path d="M 105.3 71.9 A 42 42 0 0 1 64 106" stroke="#e66100"/>
    <path d="M 64 106 A 42 42 0 0 1 24.1 77.0" stroke="#1c71d8"/>
    <path d="M 24.1 77.0 A 42 42 0 0 1 31.7 37.2" stroke="#2ec27e"/>
    <path d="M 31.7 37.2 A 42 42 0 0 1 64 22" stroke="#9141ac"/>
  </g>

  <!-- Inner hole, for the donut look. -->
  <circle cx="64" cy="64" r="24" fill="url(#bg)"/>
</svg>
