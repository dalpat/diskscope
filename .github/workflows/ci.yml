name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # The pure engine has no GTK dependency, so it builds and tests fast with no
  # system packages — the primary signal, kept as its own quick job.
  core:
    name: core (no GTK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test the scan engine
        run: cargo test -p diskscope-core

  # Full workspace, including the GTK4/libadwaita front-end.
  workspace:
    name: workspace (GTK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GTK4 + libadwaita
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-4-dev libadwaita-1-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
