name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # The pure engine has no GTK dependency, so it builds and tests fast with no
  # system packages — the primary signal, kept as its own quick job.
  core:
    name: core (no GTK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test the scan engine
        run: cargo test -p diskscope-core

  # Full workspace, including the GTK4/libadwaita front-end. The app uses
  # AdwSpinner (libadwaita 1.6+ / GTK 4.16+), which the hosted ubuntu-24.04 image
  # doesn't have, so run inside the current Ubuntu release container instead.
  workspace:
    name: workspace (GTK)
    runs-on: ubuntu-latest
    container: ubuntu:rolling
    steps:
      - name: Install GTK4 + libadwaita
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential pkg-config libgtk-4-dev libadwaita-1-dev \
            curl ca-certificates git
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
